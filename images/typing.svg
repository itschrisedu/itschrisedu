<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 60">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@600&display=swap');
    
    .text {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 600;
      fill: #00D9FF;
      text-anchor: middle;
    }

    .cursor {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 600;
      fill: #00D9FF;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .typing {
      width: 0;
      animation: typing 3s steps(30, end) forwards, 
                 erase 1.5s steps(30, end) 5s forwards,
                 typing2 3s steps(30, end) 7s forwards infinite;
      overflow: hidden;
      white-space: nowrap;
    }

    text {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 600;
      fill: #00D9FF;
    }

    #line1 {
      animation: reveal 3s steps(28) forwards;
    }

    @keyframes reveal {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }
  </style>

  <rect width="700" height="60" fill="transparent"/>

  <text x="350" y="42" text-anchor="middle" id="line1">Full Stack + AI Developer</text>

  <!-- Blinking cursor -->
  <text x="530" y="42" class="cursor">|</text>
</svg>
